<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator · MoneyClaw</title>
  <meta name="description" content="Generate QR codes instantly for any text or URL." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- qrcode.js (no install needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a23;
      --border:    #252b38;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }

    /* ── Form ── */
    .field { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.45rem;
    }
    textarea, input[type="number"], select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      transition: border-color 0.2s;
      outline: none;
      resize: vertical;
    }
    textarea:focus, input[type="number"]:focus, select:focus {
      border-color: var(--accent);
    }
    textarea { min-height: 90px; }

    .row { display: flex; gap: 1rem; }
    .row .field { flex: 1; }

    /* ── Color pickers ── */
    .color-row { display: flex; gap: 1rem; }
    .color-field { flex: 1; }
    .color-field label { margin-bottom: 0.45rem; }
    .color-field input[type="color"] {
      width: 100%;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      padding: 4px 6px;
    }

    /* ── Generate button ── */
    #generateBtn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    #generateBtn:hover { opacity: 0.9; transform: translateY(-1px); }
    #generateBtn:active { transform: translateY(0); }

    /* ── Output ── */
    #output {
      margin-top: 2rem;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: fadeUp 0.35s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #qrWrap {
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      display: inline-flex;
      box-shadow: 0 8px 30px rgba(108,99,255,0.25);
    }

    .action-row { display: flex; gap: 0.75rem; }
    .btn-outline {
      padding: 0.6rem 1.3rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-outline:hover { border-color: var(--accent); background: rgba(108,99,255,0.1); }

    /* ── Error ── */
    #errorMsg {
      display: none;
      margin-top: 0.6rem;
      color: #f87171;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <h1>⬛ QR Code Generator</h1>
  <p>Generate a QR code for any text or URL — no account needed.</p>
</header>

<div class="card">
  <!-- Input text -->
  <div class="field">
    <label for="qrInput">Content (text or URL)</label>
    <textarea id="qrInput" placeholder="https://example.com or any text…"></textarea>
    <div id="errorMsg">Please enter some content first.</div>
  </div>

  <!-- Size & Error correction -->
  <div class="row">
    <div class="field">
      <label for="qrSize">Size (px)</label>
      <input type="number" id="qrSize" value="256" min="64" max="1024" step="8" />
    </div>
    <div class="field">
      <label for="qrEcl">Error Correction</label>
      <select id="qrEcl">
        <option value="L">L – Low (7%)</option>
        <option value="M" selected>M – Medium (15%)</option>
        <option value="Q">Q – Quartile (25%)</option>
        <option value="H">H – High (30%)</option>
      </select>
    </div>
  </div>

  <!-- Colors -->
  <div class="color-row">
    <div class="color-field field">
      <label for="qrFg">Foreground</label>
      <input type="color" id="qrFg" value="#000000" />
    </div>
    <div class="color-field field">
      <label for="qrBg">Background</label>
      <input type="color" id="qrBg" value="#ffffff" />
    </div>
  </div>

  <button id="generateBtn" onclick="generateQR()">Generate QR Code</button>

  <!-- Result -->
  <div id="output">
    <div id="qrWrap"><div id="qrcode"></div></div>
    <div class="action-row">
      <button class="btn-outline" onclick="downloadQR('png')">⬇ Download PNG</button>
      <button class="btn-outline" onclick="copyQR()">📋 Copy Image</button>
    </div>
  </div>
</div>

<script>
  let qrInstance = null;

  function generateQR() {
    const text = document.getElementById('qrInput').value.trim();
    const errEl = document.getElementById('errorMsg');

    if (!text) {
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    const size   = parseInt(document.getElementById('qrSize').value) || 256;
    const ecl    = document.getElementById('qrEcl').value;
    const fg     = document.getElementById('qrFg').value;
    const bg     = document.getElementById('qrBg').value;

    // Clear previous
    const container = document.getElementById('qrcode');
    container.innerHTML = '';
    if (qrInstance) { qrInstance.clear(); qrInstance = null; }

    qrInstance = new QRCode(container, {
      text,
      width:            size,
      height:           size,
      colorDark:        fg,
      colorLight:       bg,
      correctLevel:     QRCode.CorrectLevel[ecl],
    });

    const output = document.getElementById('output');
    output.style.display = 'flex';
    output.style.animation = 'none';
    requestAnimationFrame(() => { output.style.animation = ''; });
  }

  function getCanvas() {
    return document.querySelector('#qrcode canvas');
  }

  function downloadQR(fmt) {
    const canvas = getCanvas();
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'qrcode.' + fmt;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  async function copyQR() {
    const canvas = getCanvas();
    if (!canvas) return;
    canvas.toBlob(async (blob) => {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        alert('QR code copied to clipboard!');
      } catch {
        alert('Copy not supported in this browser. Use Download instead.');
      }
    });
  }

  // Allow Enter in textarea with Ctrl/Cmd
  document.getElementById('qrInput').addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generateQR();
  });
</script>

</body>
</html>
